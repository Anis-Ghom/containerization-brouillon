# COMMIT: Members 1 & 2 (frontend pair). Nginx is part of frontend pair's scope.
# Your task: Reverse proxy and load balancer config. Both members contribute; all 4 review docker-compose.yaml.
# BONUS: Reverse proxy + load balancer.
# Single entry point: / -> frontend, /api1/ -> API1, /api2/ -> API2.
# With replicas (--scale api1=2 --scale api2=2), Docker DNS round-robins to backends.
events { worker_connections 1024; }
http {
  upstream frontend { server frontend:5173; }
  upstream api1_backend { server api1:8001; }
  upstream api2_backend { server api2:8002; }
  server {
    listen 80;
    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api1/ {
      proxy_pass http://api1_backend/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api2/ {
      proxy_pass http://api2_backend/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
